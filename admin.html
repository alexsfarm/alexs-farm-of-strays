<!DOCTYPE html>
<html lang="en">
<head>

<style>
  :root{--navy:#16314a;--blue:#1b7fcc;--amber:#f6a623;--amber-deep:#e07c0c;--line:#e7ebf0;--muted:#5f6b78;--soft:#f4f9fd;--ok:#1f9d55;--danger:#e2483a}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;color:#1b2630;background:#eef4fa}
  header{background:var(--navy);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
  header img{width:38px;height:38px;border-radius:50%}
  header h1{font-size:1.05rem;margin:0;flex:1}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 6px 20px rgba(18,50,90,.06)}
  h2{color:var(--navy);margin:.1em 0 .5em;font-size:1.15rem}
  h3{color:var(--navy);margin:.2em 0 .5em;font-size:1rem}
  label{display:block;font-weight:700;font-size:.8rem;margin:9px 0 4px;color:var(--navy)}
  input,select,textarea{width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:.95rem;font-family:inherit;background:#fff}
  input[type=color]{padding:3px;height:42px;cursor:pointer}
  textarea{min-height:60px;resize:vertical}
  .btn{border:0;border-radius:999px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:.92rem}
  .btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-deep));color:#fff}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-light{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn-danger{background:var(--danger);color:#fff;padding:7px 13px;font-size:.82rem}
  .btn-sm{padding:7px 13px;font-size:.82rem}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .grid-colors{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  @media(max-width:620px){.grid2,.grid3{grid-template-columns:1fr}}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0}
  .tabs button{flex:0 0 auto}
  .tabs .on{background:var(--navy);color:#fff}
  .muted{color:var(--muted);font-size:.85rem}
  .hide{display:none}
  .note{background:#fff7e0;border:1px solid #ffe08a;border-radius:10px;padding:11px 13px;font-size:.85rem;color:#7a5b00;margin-bottom:14px}
  .ok-note{background:#e8f8ef;border:1px solid #b6e6c9;color:#155d36}
  .item{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fcfdff}
  .item .item-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .savebar{position:sticky;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);
     padding:12px 22px;display:flex;align-items:center;gap:12px;z-index:15;box-shadow:0 -6px 20px rgba(18,50,90,.07)}
  .toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:var(--ok);color:#fff;padding:11px 20px;border-radius:999px;
     font-weight:700;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .thumb{width:64px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:#f0f4f8}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.74rem;font-weight:700;background:var(--soft);color:var(--navy)}
  details{border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px}
  summary{font-weight:700;color:var(--navy);cursor:pointer}
  .health{font-size:.85rem}
  .health b{color:var(--ok)}

/* ---------- API ---------- */
async function api(action, payload){
  const res = await fetch('/api/admin', {
    method:'POST', headers:{'Content-Type':'application/json','x-admin-password':PW},
    body: JSON.stringify(Object.assign({action}, payload||{}))
  });
  let data=null; try{ data = await res.json(); }catch(e){}
  if(res.status===401) throw new Error('Wrong admin password (unauthorized).');
  if(!res.ok) throw new Error((data&&data.error) ? data.error : ('Server error '+res.status));
  if(data && data.error) throw new Error(data.error);
  return data;
}

function unlock(){
  PW = document.getElementById('pw').value;
  sessionStorage.setItem('af_admin_pw', PW);
  api('get-settings').then(()=>enterApp()).catch(()=>{
    document.getElementById('loginErr').textContent = 'Wrong password, or the database isn’t set up yet (see SETUP-GUIDE.md).';
  });
}
function signOut(){ sessionStorage.removeItem('af_admin_pw'); location.reload(); }

async function enterApp(){
  document.getElementById('loginCard').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('savebar').classList.remove('hide');
  document.getElementById('health').innerHTML = 'Database: <b>connected ✓</b> — your changes are saved online and shown on the public site.';
  await loadAll();
  if(!LOADED) document.getElementById('health').innerHTML = '⚠️ <b>Could not load your saved content — saving is disabled to protect it. Please refresh the page.</b>';
  buildTabs();
  render();
}

// Fill any missing/empty fields in `target` from `src` (deep), without
// overwriting values the user has already set. Lets us pre-load config.js
// defaults into the editors so editing one item never blanks the rest.
function deepFill(target, src){
  if(!src || typeof src!=='object') return target;
  Object.keys(src).forEach(k=>{
    const sv=src[k], tv=target[k];
    if(Array.isArray(sv)){ if(!Array.isArray(tv) || !tv.length) target[k]=sv.map(x=> (x&&typeof x==='object')?Object.assign({},x):x); }
    else if(sv && typeof sv==='object'){ if(!tv || typeof tv!=='object' || Array.isArray(tv)) target[k]={}; deepFill(target[k], sv); }
    else { if(tv===undefined || tv===null || tv==='') target[k]=sv; }
  });
  return target;
}
async function loadAll(){
  try{ const res = await api('get-settings'); S = (res && res.data!==undefined ? res.data : res) || {}; BASE_TS = (res && res.ts) || null; LOADED = true; }
  catch(e){ S = {}; LOADED = false; }
  if(typeof S !== 'object' || S === null) S = {};
  S.text = S.text || {};
  S.theme = S.theme || {}; S.theme.colors = S.theme.colors || {};
  S.donate = S.donate || {}; S.donate.methods = S.donate.methods || [];
  S.socials = Array.isArray(S.socials) ? S.socials : [];
  S.storyParagraphs = Array.isArray(S.storyParagraphs) ? S.storyParagraphs : [];
  S.stats = Array.isArray(S.stats) ? S.stats : [];
  S.adoptionSteps = Array.isArray(S.adoptionSteps) ? S.adoptionSteps : [];
  S.helpCards = Array.isArray(S.helpCards) ? S.helpCards : [];
  S.park = S.park || {};
  // Pre-load the current site content (from config.js) into the editors wherever
  // nothing is saved yet, so editing one item never blanks out the rest.
  const C = (window.SITE_CONFIG) || {};
  if(!S.strapline && C.strapline) S.strapline = C.strapline;
  if(!S.storyParagraphs.length && Array.isArray(C.storyParagraphs)) S.storyParagraphs = C.storyParagraphs.slice();
  if(!S.stats.length && Array.isArray(C.stats)) S.stats = C.stats.map(o=>Object.assign({},o));
  if(!S.adoptionSteps.length && Array.isArray(C.adoptionSteps)) S.adoptionSteps = C.adoptionSteps.map(o=>Object.assign({},o));
  if(!S.donate.methods.length){
    const cd=C.donate||{}, dm=[];
    if(cd.bankName||cd.iban) dm.push({label:'Bank transfer', lines:cd.bankName?['Account name: '+cd.bankName]:[], code:cd.iban||'', url:''});
    if(cd.revolut) dm.push({label:'Revolut', lines:[], code:'', url:cd.revolut});
    if(cd.paypal)  dm.push({label:'PayPal', lines:[], code:'', url:cd.paypal});
    if(dm.length) S.donate.methods = dm;
  }
  if(!S.socials.length){
    const sc=[];
    if(C.facebookRescue) sc.push({type:'facebook',label:'Rescue Facebook',url:C.facebookRescue});
    if(C.facebookPark)   sc.push({type:'facebook',label:'Paphos Paws Park',url:C.facebookPark});
    if(C.tiktok)         sc.push({type:'tiktok',label:'TikTok',url:C.tiktok});
    if(C.charityShop)    sc.push({type:'shop',label:'Charity shop',url:C.charityShop});
    if(sc.length) S.socials = sc;
  }
  if(!S.helpCards.length) S.helpCards = DEFAULT_HELP.map(o=>Object.assign({},o));
  deepFill(S.park, C.park||{});
  S.emails = S.emails || {};
  ['request','confirmed','prearrival','postvisit'].forEach(k=>{ if(!S.emails[k] || !S.emails[k].body) S.emails[k]=Object.assign({}, DEFAULT_EMAILS[k]); });
  S.pages = S.pages || {};
  ['faqs','privacy','terms'].forEach(k=>{ if(!S.pages[k] || !S.pages[k].body){ S.pages[k] = (C.pages && C.pages[k]) ? Object.assign({}, C.pages[k]) : {title:'',body:''}; } });
  if(!S.adoptionDonations || !Array.isArray(S.adoptionDonations.cards) || !S.adoptionDonations.cards.length){
    S.adoptionDonations = C.adoptionDonations ? JSON.parse(JSON.stringify(C.adoptionDonations)) : {heading:'',intro:'',cards:[],footer:''};
  }
  try{ A = await api('list-animals') || []; }catch(e){ A = []; }
  if(!Array.isArray(A)) A = [];
  try{ B = await api('list-bookings') || []; }catch(e){ B = []; }
  if(!Array.isArray(B)) B = [];
}

async function persistSettings(){
  if(!LOADED) throw new Error('Could not load your saved content — please refresh the page before saving.');
  const res = await api('save-settings', {settings:S, baseTs:BASE_TS});
  BASE_TS = (res && res.ts) || BASE_TS;
  return res;
}
async function saveSettings(){
  try{ await persistSettings(); toast('Saved ✓  Refresh your website to see the changes.'); }
  catch(e){ toast('Could not save: '+(e.message||'unknown error'), true); }
}
function toast(msg, bad){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.background= bad? 'var(--danger)':'var(--ok)';
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'), bad?7000:3500);
}
// Surface any unexpected save/add/delete/photo/booking failure with a real, useful message
window.addEventListener('unhandledrejection', e=>{ const m=(e.reason&&e.reason.message)||String(e.reason||'Something went wrong'); toast('⚠️ '+m, true); });

/* ---------- tiny DOM helpers ---------- */
function el(tag, attrs, kids){
  const e=document.createElement(tag);
  if(attrs) for(const k in attrs){ if(k==='class') e.className=attrs[k]; else if(k==='html') e.innerHTML=attrs[k]; else if(k.slice(0,2)==='on') e.addEventListener(k.slice(2), attrs[k]); else if(attrs[k]!=null) e.setAttribute(k, attrs[k]); }
  (kids||[]).forEach(k=> e.appendChild(typeof k==='string'? document.createTextNode(k): k));
  return e;
}
function inputField(label, value, onInput, opts){
  opts = opts || {};
  const tag = opts.tag || 'input';
  const e = el(tag, {});
  if(tag==='textarea'){ e.value = value==null?'':value; }
  else { e.type = opts.type || 'text'; e.value = value==null?'':value; }
  if(opts.placeholder) e.placeholder = opts.placeholder;
  if(opts.min!=null) e.min = opts.min;
  e.addEventListener('input', ()=> onInput(e.value));
  const w = el('div', opts.full?{class:'full'}:{});
  if(label) w.appendChild(el('label', {}, [label]));
  w.appendChild(e);
  return w;
}
function selectField(label, value, options, onInput){
  const s = el('select', {});
  options.forEach(o=>{ const [val,txt] = Array.isArray(o)?o:[o,o]; const op=el('option',{value:val},[txt]); if(String(val)===String(value)) op.selected=true; s.appendChild(op); });
  s.addEventListener('change', ()=> onInput(s.value));
  const w = el('div'); if(label) w.appendChild(el('label',{},[label])); w.appendChild(s); return w;
}

const TABS = [
  ['content','📝 Content & text'],['design','🎨 Design'],['animals','🐾 Animals'],
  ['donate','💳 Donations'],['links','🔗 Links & social'],['park','🎾 Park & booking'],['emails','📧 Emails'],['pages','📄 Pages'],['adoptdono','💶 Adoption donations'],['bookings','📅 Bookings']
];
function buildTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  TABS.forEach(([id,label])=> t.appendChild(el('button',{class:'btn btn-light'+(id===TAB?' on':''), onclick:()=>{TAB=id; buildTabs(); render();}},[label])));
  t.appendChild(el('button',{class:'btn btn-light', style:'margin-left:auto', onclick:signOut},['Sign out']));
}

/* ---------- render router ---------- */
function render(){
  const p=document.getElementById('panel'); p.innerHTML='';
  const sb=document.getElementById('savebar');
  sb.classList.toggle('hide', TAB==='animals'||TAB==='bookings');   // those save per-row
  ({content:renderContent, design:renderDesign, animals:renderAnimals, donate:renderDonate, links:renderLinks, park:renderPark, emails:renderEmails, pages:renderPages, adoptdono:renderDono, bookings:renderBookings}[TAB])(p);
}

/* generic add/remove list editor */
function listEditor(title, arr, makeNew, renderItem, addLabel, hint){
  const c=el('div',{class:'card'}); c.appendChild(el('h3',{},[title]));
  if(hint) c.appendChild(el('p',{class:'muted'},[hint]));
  const host=el('div'); c.appendChild(host);
  function draw(){
    host.innerHTML='';
    arr.forEach((item,i)=>{
      const box=el('div',{class:'item'});
      box.appendChild(el('div',{class:'item-head'},[ el('span',{class:'pill'},['#'+(i+1)]),
        el('button',{class:'btn btn-danger',onclick:()=>{ arr.splice(i,1); draw(); }},['Remove']) ]));
      renderItem(item,i,box);
      host.appendChild(box);
    });
  }
  draw();
  c.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:()=>{ arr.push(makeNew()); draw(); }},['+ '+(addLabel||'Add')]));
  return c;
}

function renderDesign(p){
  p.appendChild(el('div',{class:'note'},['Pick colours and a font for the whole site. Use "Reset to brand colours" any time to put it back.']));
  const c=el('div',{class:'card'}); c.appendChild(el('h3',{},['Colours']));
  const grid=el('div',{class:'grid-colors'});
  COLORS.forEach(([varName,label,def])=>{
    const cur = (S.theme.colors[varName]) || def;
    const wrap=el('div'); wrap.appendChild(el('label',{},[label]));
    const ci=el('input',{type:'color', value: toHex(cur)});
    ci.addEventListener('input',()=>{ S.theme.colors[varName]=ci.value; });
    wrap.appendChild(ci); grid.appendChild(wrap);
  });
  c.appendChild(grid);
  c.appendChild(el('p',{},[ el('button',{class:'btn btn-light btn-sm',onclick:()=>{ S.theme.colors={}; render(); toast('Colours reset — remember to Save.'); }},['Reset to brand colours']) ]));
  p.appendChild(c);

  const f=el('div',{class:'card'}); f.appendChild(el('h3',{},['Font & text size']));
  f.appendChild(selectField('Font', S.theme.font||FONTS[0][1], FONTS.map(([l,v])=>[v,l]), v=> S.theme.font=v));
  f.appendChild(selectField('Overall text size', String(S.theme.scale||1), [['0.9','Smaller'],['1','Normal'],['1.1','Larger'],['1.2','Largest']], v=> S.theme.scale=parseFloat(v)));
  p.appendChild(f);
}
function toHex(c){ // accept #rrggbb only for the picker; fall back to default-ish
  if(/^#[0-9a-fA-F]{6}$/.test(c)) return c;
  if(/^#[0-9a-fA-F]{3}$/.test(c)) return '#'+c.slice(1).split('').map(x=>x+x).join('');
  return '#000000';
}

function renderAnimals(p){
  p.appendChild(el('div',{class:'note'},['Add, edit, photograph, reorder or remove animals here. Changes save as soon as you press the buttons.']));
  // Add new
  const add=el('div',{class:'card'}); add.appendChild(el('h3',{},['Add an animal']));
  const draft={name:'',species:'Dog',status:'available',blurb:'',details:'',sort: (A.length?Math.max.apply(null,A.map(a=>a.sort||0))+1:0)};
  const g=el('div',{class:'grid2'});
  g.appendChild(inputField('Name', '', v=> draft.name=v));
  g.appendChild(selectField('Type', 'Dog', ['Dog','Cat','Rabbit','Bird','Other'], v=> draft.species=v));
  add.appendChild(g);
  add.appendChild(inputField('Short description', '', v=> draft.blurb=v, {tag:'textarea'}));
  add.appendChild(inputField('Details (one bullet per line)', '', v=> draft.details=v, {tag:'textarea'}));
  add.appendChild(el('p',{},[ el('button',{class:'btn btn-primary',onclick:async()=>{
    if(!draft.name){ toast('Please enter a name.', true); return; }
    await api('add-animal',{animal:{name:draft.name,species:draft.species,status:draft.status,blurb:draft.blurb,
      details:String(draft.details).split('\n').map(s=>s.trim()).filter(Boolean), sort:draft.sort}});
    toast('Animal added ✓'); A = await api('list-animals'); render();
  }},['Add animal']) ]));
  p.appendChild(add);

  // Existing
  if(!A.length){ p.appendChild(el('div',{class:'card'},[el('p',{class:'muted'},['No animals yet — add one above.'])])); return; }
  A.forEach(a=>{
    const c=el('div',{class:'item'});
    const head=el('div',{class:'item-head'});
    head.appendChild(el('img',{class:'thumb', src: a.photo_url||'assets/logo.svg', alt:''}));
    head.appendChild(el('b',{style:'flex:1'},[a.name||'(no name)']));
    head.appendChild(el('span',{class:'pill'},[a.status||'available']));
    c.appendChild(head);
    const g2=el('div',{class:'grid2'});
    g2.appendChild(inputField('Name', a.name, v=> a.name=v));
    g2.appendChild(selectField('Type', a.species||'Dog', ['Dog','Cat','Rabbit','Bird','Other'], v=> a.species=v));
    g2.appendChild(selectField('Status', a.status||'available', [['available','Available'],['rehomed','Re-homed'],['hidden','Hidden (off the site)']], v=> a.status=v));
    g2.appendChild(inputField('Order (lower shows first)', a.sort||0, v=> a.sort=parseInt(v,10)||0, {type:'number'}));
    c.appendChild(g2);
    c.appendChild(inputField('Short description', a.blurb, v=> a.blurb=v, {tag:'textarea'}));
    c.appendChild(inputField('Details (one bullet per line)', (a.details||[]).join('\n'), v=> a._details=v, {tag:'textarea'}));
    // photo controls
    const photoRow=el('div',{class:'row',style:'margin-top:8px'});
    const file=el('input',{type:'file', accept:'image/*', style:'max-width:230px'});
    file.addEventListener('change', async()=>{ if(file.files[0]){ await uploadPhoto(a, file.files[0]); } });
    photoRow.appendChild(file);
    if(a.photo_url) photoRow.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:()=>removePhoto(a)},['Remove photo']));
    c.appendChild(photoRow);
    c.appendChild(el('p',{class:'muted',style:'margin:6px 0 0'},['Tip: photos are shrunk automatically before upload, so phone photos are fine.']));
    // save / quick toggle / delete
    const actions=el('div',{class:'row',style:'margin-top:10px'});
    actions.appendChild(el('button',{class:'btn btn-blue btn-sm',onclick:()=>saveAnimal(a)},['Save changes']));
    actions.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:async()=>{ a.status = (a.status==='rehomed')?'available':'rehomed'; await saveAnimal(a,true); render(); }},['Toggle available / re-homed']));
    actions.appendChild(el('button',{class:'btn btn-danger',style:'margin-left:auto',onclick:()=>delAnimal(a)},['Delete']));
    c.appendChild(actions);
    p.appendChild(c);
  });
}
async function saveAnimal(a, quiet){
  const patch={name:a.name,species:a.species,status:a.status,blurb:a.blurb,sort:a.sort};
  if(a._details!=null) patch.details=String(a._details).split('\n').map(s=>s.trim()).filter(Boolean);
  await api('update-animal',{id:a.id, animal:patch});
  if(!quiet) toast('Saved ✓');
}
async function delAnimal(a){
  if(!confirm('Delete '+(a.name||'this animal')+'?')) return;
  if(a.photo_url) await api('delete-photo',{path:pathFromUrl(a.photo_url)}).catch(()=>{});
  await api('delete-animal',{id:a.id}); toast('Deleted'); A = await api('list-animals'); render();
}
async function uploadPhoto(a, file){
  toast('Uploading photo…');
  try{
    const {dataB64,contentType} = await downscale(file);
    const res = await api('upload-photo',{filename:(file.name||'photo.jpg'), contentType, dataB64});
    if(res && res.publicUrl){ await api('update-animal',{id:a.id, animal:{photo_url:res.publicUrl}}); toast('Photo uploaded ✓'); A = await api('list-animals'); render(); }
    else toast('Upload failed: '+((res&&res.error)||'unknown'), true);
  }catch(e){ toast('Upload failed: '+(e.message||'unknown'), true); }
}
async function removePhoto(a){
  if(a.photo_url) await api('delete-photo',{path:pathFromUrl(a.photo_url)}).catch(()=>{});
  await api('update-animal',{id:a.id, animal:{photo_url:null}}); toast('Photo removed'); A = await api('list-animals'); render();
}
function pathFromUrl(u){ const m=String(u||'').match(/animal-photos\/(.+)$/); return m?decodeURIComponent(m[1]):''; }
function downscale(file, max=1600, q=0.85){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',q);
      resolve({dataB64:dataUrl.split(',')[1], contentType:'image/jpeg'});
    };
    img.onerror=reject; img.src=url;
  });
}

/* ===== PARK & BOOKING ===== */
async function uploadParkPhoto(file){
  toast('Uploading photo…');
  try{
    const {dataB64,contentType}=await downscale(file);
    const res=await api('upload-photo',{filename:(file.name||'park.jpg'), contentType, dataB64});
    if(res&&res.publicUrl){ S.park.gallery=Array.isArray(S.park.gallery)?S.park.gallery:[]; S.park.gallery.push({url:res.publicUrl, path:res.path}); await persistSettings(); toast('Photo added ✓'); render(); }
    else toast('Upload failed: '+((res&&res.error)||'unknown'), true);
  }catch(e){ toast('Upload failed: '+(e.message||'unknown'), true); }
}
async function removeParkPhoto(i){
  const a=S.park.gallery||[]; const g=a[i]; if(!g) return;
  if(!confirm('Delete this park photo?')) return;
  const path=(g&&typeof g==='object'&&g.path)?g.path:pathFromUrl(typeof g==='string'?g:(g&&g.url));
  if(path) await api('delete-photo',{path}).catch(()=>{});
  a.splice(i,1); await persistSettings(); toast('Photo deleted'); render();
}
async function moveParkPhoto(i,dir){
  const a=S.park.gallery||[]; const j=i+dir; if(j<0||j>=a.length) return;
  const t=a[i]; a[i]=a[j]; a[j]=t; await persistSettings(); render();
}
function renderPark(p){
  const k=S.park;
  p.appendChild(el('div',{class:'note'},['Settings for Paphos Paws Park and the booking form. Time slots are one per line, e.g. "07:30 – 08:30".']));
  const c=el('div',{class:'card'}); c.appendChild(el('h3',{},['Basics']));
  const g=el('div',{class:'grid2'});
  g.appendChild(inputField('Park location / address', k.address, v=> k.address=v));
  g.appendChild(selectField('Currency', k.currency||'EUR', [['EUR','€ Euro'],['GBP','£ Pound']], v=> k.currency=v));
  g.appendChild(inputField('Max dogs per booking', k.maxDogs||7, v=> k.maxDogs=parseInt(v,10)||1, {type:'number',min:1}));
  g.appendChild(inputField('Minimum notice (hours)', k.minNoticeHours||24, v=> k.minNoticeHours=parseInt(v,10)||24, {type:'number',min:1}));
  g.appendChild(inputField('Maximum advance (days)', k.maxAdvanceDays||365, v=> k.maxAdvanceDays=parseInt(v,10)||365, {type:'number',min:1}));
  g.appendChild(inputField('Hold unconfirmed slots for (hours)', k.holdHours!=null?k.holdHours:2, v=> k.holdHours=parseInt(v,10)||2, {type:'number',min:1}));
  g.appendChild(inputField('Post-visit email — hours after visit', k.postVisitHours!=null?k.postVisitHours:1, v=> k.postVisitHours=parseInt(v,10)||1, {type:'number',min:0}));
  c.appendChild(g);
  c.appendChild(inputField('"Funds the rescue" note (under the price)', k.fundsMessage||'', v=> k.fundsMessage=v, {tag:'textarea', placeholder:'Every booking helps fund food and vet care…'}));
  p.appendChild(c);

  // Pricing
  const pc=el('div',{class:'card'}); pc.appendChild(el('h3',{},['Price by number of dogs (€/£)']));
  k.priceByDogs = k.priceByDogs || {};
  const pg=el('div',{class:'grid3'});
  for(let i=1;i<=(k.maxDogs||7);i++){ pg.appendChild(inputField(i+(i===1?' dog':' dogs'), k.priceByDogs[i]!=null?k.priceByDogs[i]:'', (function(n){return v=>{ if(v==='') delete k.priceByDogs[n]; else k.priceByDogs[n]=parseFloat(v)||0; };})(i), {type:'number'})); }
  pc.appendChild(pg); p.appendChild(pc);

  // Season + hours + slots
  k.season = k.season || {};
  const sc=el('div',{class:'card'}); sc.appendChild(el('h3',{},['Opening hours & time slots']));
  sc.appendChild(selectField('Which hours to use', k.season.mode||'auto', [['auto','Switch automatically by date'],['summer','Always summer'],['winter','Always winter']], v=> k.season.mode=v));
  const dg=el('div',{class:'grid2'});
  dg.appendChild(inputField('Summer starts (MM-DD)', k.season.summerStart||'03-01', v=> k.season.summerStart=v, {placeholder:'03-01'}));
  dg.appendChild(inputField('Summer ends (MM-DD)', k.season.summerEnd||'10-31', v=> k.season.summerEnd=v, {placeholder:'10-31'}));
  sc.appendChild(dg);
  ['summer','winter'].forEach(seas=>{
    k.season[seas]=k.season[seas]||{};
    const d=el('details'); d.appendChild(el('summary',{},[seas.charAt(0).toUpperCase()+seas.slice(1)+' hours & slots']));
    d.appendChild(inputField('Hours label', k.season[seas].hours||'', v=> k.season[seas].hours=v, {placeholder:'Daily 07:30–19:45'}));
    d.appendChild(inputField('Time slots (one per line)', (k.season[seas].slots||[]).join('\n'), v=> k.season[seas].slots=v.split('\n').map(s=>s.trim()).filter(Boolean), {tag:'textarea', placeholder:'07:30 – 08:30'}));
    sc.appendChild(d);
  });
  p.appendChild(sc);

  // Park photos (gallery / carousel)
  k.gallery = Array.isArray(k.gallery) ? k.gallery : [];
  const gc=el('div',{class:'card'}); gc.appendChild(el('h3',{},['Park photos (carousel)']));
  gc.appendChild(el('p',{class:'muted'},['Shown in the photo carousel on the Dog Park section. Upload photos (auto-shrunk, so phone photos are fine), reorder with the arrows, or delete. These save automatically.']));
  const up=el('input',{type:'file', accept:'image/*', multiple:'multiple'});
  up.addEventListener('change', async()=>{ const files=Array.from(up.files||[]); up.value=''; for(const f of files){ await uploadParkPhoto(f); } });
  gc.appendChild(up);
  const pgr=el('div',{class:'grid3',style:'margin-top:12px'});
  if(!k.gallery.length){ pgr.appendChild(el('p',{class:'muted'},['No park photos yet — upload one above.'])); }
  k.gallery.forEach((g,i)=>{
    const url=(typeof g==='string')?g:(g&&g.url);
    const box=el('div',{class:'item'});
    box.appendChild(el('img',{src:url||'assets/logo.svg', alt:'', style:'width:100%;height:120px;object-fit:cover;border-radius:8px'}));
    const row=el('div',{class:'row',style:'margin-top:6px'});
    row.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:()=>moveParkPhoto(i,-1)},['↑']));
    row.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:()=>moveParkPhoto(i,1)},['↓']));
    row.appendChild(el('button',{class:'btn btn-danger btn-sm',style:'margin-left:auto',onclick:()=>removeParkPhoto(i)},['Delete']));
    box.appendChild(row); pgr.appendChild(box);
  });
  gc.appendChild(pgr); p.appendChild(gc);

  // Lockbox codes
  const lc=el('div',{class:'card'}); lc.appendChild(el('h3',{},['Dog-park access codes (kept private)']));
  lc.appendChild(el('p',{class:'muted'},['These are sent to a customer before their visit. They are NOT shown on the public website.']));
  k.access = k.access || {};
  const lg=el('div',{class:'grid3'});
  lg.appendChild(inputField('Gate code (into the plot)', k.access.gateCode||'', v=> k.access.gateCode=v));
  lg.appendChild(inputField('Fenced-area code', k.access.fencedCode||'', v=> k.access.fencedCode=v));
  lg.appendChild(inputField('Send code how many hours before?', k.access.codeLeadHours!=null?k.access.codeLeadHours:2, v=> k.access.codeLeadHours=parseInt(v,10)||2, {type:'number',min:0}));
  lc.appendChild(lg);
  p.appendChild(lc);
}

/* ===== INFO PAGES (FAQs / Privacy / Terms) ===== */
function renderPages(p){
  p.appendChild(el('div',{class:'note'},['These are the pop-up pages linked in the website footer. Edit the wording below. Tip: start a line with "## " to make it a section heading; questions (lines ending in "?") show in bold. Press "Save content & design" after editing.']));
  S.pages = S.pages || {};
  [['faqs','FAQs'],['privacy','Privacy Policy'],['terms','Terms & Conditions']].forEach(([key,name])=>{
    S.pages[key]=S.pages[key]||{};
    const c=el('div',{class:'card'}); c.appendChild(el('h3',{},[name]));
    c.appendChild(inputField('Title (also the footer link label)', S.pages[key].title||name, v=> S.pages[key].title=v));
    c.appendChild(inputField('Content', S.pages[key].body||'', v=> S.pages[key].body=v, {tag:'textarea'}));
    p.appendChild(c);
  });
}

/* ===== ADOPTION DONATIONS (expandable cards on the main page) ===== */
function renderDono(p){
  p.appendChild(el('div',{class:'note'},['This is the "Adoption donations" section on the main page (it sits between "The adoption procedure" and "Looking for a home", shown as four expandable cards). Formatting tips: start a line with "## " for a small heading (e.g. the price), "- " for a bullet point, or "> " for an italic note. Leave a blank line between paragraphs. Press "Save content & design" after editing.']));
  const D = S.adoptionDonations = S.adoptionDonations || {};
  D.cards = Array.isArray(D.cards) ? D.cards : [];
  const top=el('div',{class:'card'}); top.appendChild(el('h3',{},['Heading & intro']));
  top.appendChild(inputField('Section heading', D.heading||'', v=> D.heading=v));
  top.appendChild(inputField('Intro text (shown above the cards)', D.intro||'', v=> D.intro=v, {tag:'textarea'}));
  p.appendChild(top);
  const names=['Card 1 — Dogs · Adoption in Cyprus','Card 2 — Dogs · Adoption to the UK','Card 3 — Cats · Adoption in Cyprus','Card 4 — Cats · Adoption to the UK'];
  for(let i=0;i<4;i++){
    D.cards[i]=D.cards[i]||{};
    const c=el('div',{class:'card'}); c.appendChild(el('h3',{},[names[i]]));
    c.appendChild(inputField('Icon (emoji)', D.cards[i].icon||'', v=> D.cards[i].icon=v));
    c.appendChild(inputField('Card title', D.cards[i].title||'', v=> D.cards[i].title=v));
    c.appendChild(inputField('Card content', D.cards[i].body||'', v=> D.cards[i].body=v, {tag:'textarea'}));
    p.appendChild(c);
  }
  const foot=el('div',{class:'card'}); foot.appendChild(el('h3',{},['Footer note (shown below the cards)']));
  foot.appendChild(inputField('Footer text', D.footer||'', v=> D.footer=v, {tag:'textarea'}));
  p.appendChild(foot);
}

/* ===== BOOKINGS ===== */
function renderBookings(p){
  // --- Add a booking on a customer's behalf (incl. same-day) ---
  const seas=(S.park&&S.park.season)||{};
  const slotOpts=[...new Set([].concat((seas.summer&&seas.summer.slots)||[], (seas.winter&&seas.winter.slots)||[]))];
  const payOpts=((S.donate&&S.donate.methods)||[]).map(m=>m.label).filter(Boolean);
  const nb={date:'',slot:'',dogs:1,name:'',phone:'',email:'',payment:'',status:'confirmed',sendEmail:false};
  const ac=el('div',{class:'card'}); ac.appendChild(el('h3',{},['Add a booking (for a customer who contacted you)']));
  ac.appendChild(el('p',{class:'muted'},['Book someone in yourself — including same-day. This skips the 24-hour rule and holds the slot.']));
  const g1=el('div',{class:'grid2'});
  g1.appendChild(inputField('Date', '', v=> nb.date=v, {type:'date'}));
  g1.appendChild(slotOpts.length ? selectField('Time slot', '', [['','Choose a time…']].concat(slotOpts.map(s=>[s,s])), v=> nb.slot=v) : inputField('Time slot', '', v=> nb.slot=v, {placeholder:'e.g. 10:00 – 11:00'}));
  ac.appendChild(g1);
  const g2=el('div',{class:'grid3'});
  g2.appendChild(inputField('Number of dogs', 1, v=> nb.dogs=parseInt(v,10)||1, {type:'number',min:1}));
  g2.appendChild(selectField('Status', 'confirmed', [['confirmed','Confirmed'],['requested','Requested (awaiting payment)']], v=> nb.status=v));
  g2.appendChild(payOpts.length ? selectField('Donation method', '', [['','—']].concat(payOpts.map(l=>[l,l])), v=> nb.payment=v) : inputField('Donation method', '', v=> nb.payment=v));
  ac.appendChild(g2);
  const g3=el('div',{class:'grid3'});
  g3.appendChild(inputField('Customer name', '', v=> nb.name=v));
  g3.appendChild(inputField('Phone', '', v=> nb.phone=v));
  g3.appendChild(inputField('Email', '', v=> nb.email=v, {type:'email'}));
  ac.appendChild(g3);
  const cw=el('label',{style:'display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:400'});
  const chk=el('input',{type:'checkbox'}); chk.addEventListener('change',()=>{ nb.sendEmail=chk.checked; });
  cw.appendChild(chk); cw.appendChild(document.createTextNode('Also email the confirmation to the customer'));
  ac.appendChild(cw);
  ac.appendChild(el('p',{},[ el('button',{class:'btn btn-primary',style:'margin-top:10px',onclick:async()=>{
    if(!nb.date||!nb.slot){ toast('Please choose a date and time slot.', true); return; }
    if(!nb.name){ toast('Please enter the customer name.', true); return; }
    try{ await api('create-booking',{booking:nb}); toast('Booking added ✓'); B=await api('list-bookings'); render(); }
    catch(e){ toast('Could not add booking: '+(e.message||'unknown'), true); }
  }},['Add booking']) ]));
  p.appendChild(ac);

  if(!B.length){ p.appendChild(el('div',{class:'card'},[el('h3',{},['Booking requests']), el('p',{class:'muted'},['No booking requests yet. Requests made on the website appear here.'])])); return; }
  const c=el('div',{class:'card'}); c.appendChild(el('h3',{},['Dog-park booking requests']));
  c.appendChild(el('p',{class:'muted'},['"requested" = awaiting your confirmation. Mark confirmed once the customer has paid, Mark cancelled to decline, or Delete to remove it and free the slot.']));
  B.forEach(b=>{
    const ref='PPP-'+String(b.date||'').replace(/-/g,'').slice(2)+'-'+String(b.id||'').replace(/-/g,'').slice(0,4).toUpperCase();
    const box=el('div',{class:'item'});
    box.appendChild(el('div',{html:`<b>${esc(ref)}</b> &middot; <b>${esc(b.date)}</b> &middot; ${esc(b.slot)} &middot; ${esc(b.name||'')} &middot; ${esc(b.phone||'')} &middot; ${esc(b.email||'')} &middot; ${esc(b.dogs)} dog(s)${b.amount!=null?(' &middot; €'+esc(b.amount)):''}${b.payment_method?(' &middot; 💳 '+esc(b.payment_method)):''} &middot; <span class="pill">${esc(b.status)}</span>`}));
    const row=el('div',{class:'row',style:'margin-top:8px'});
    row.appendChild(el('button',{class:'btn btn-blue btn-sm',onclick:async()=>{ await api('update-booking',{id:b.id,booking:{status:'confirmed'}}); b.status='confirmed'; render(); }},['Mark confirmed']));
    row.appendChild(el('button',{class:'btn btn-light btn-sm',onclick:async()=>{ await api('update-booking',{id:b.id,booking:{status:'cancelled'}}); b.status='cancelled'; render(); }},['Mark cancelled']));
    row.appendChild(el('button',{class:'btn btn-danger',style:'margin-left:auto',onclick:async()=>{ if(confirm('Delete this booking and free the slot?')){ await api('delete-booking',{id:b.id}); B=await api('list-bookings'); render(); } }},['Delete (free slot)']));
    box.appendChild(row); c.appendChild(box);
  });
  p.appendChild(c);
}

// auto sign-in if we already have a stored password
if(PW){ api('get-settings').then(()=>enterApp()).catch(()=>{}); }
</script>
